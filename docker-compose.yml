services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moviecat-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/moviecat_db
      DB_USERNAME: moviecat
      DB_PASSWORD: moviecat
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16
    container_name: moviecat-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: moviecat_db
      POSTGRES_USER: moviecat
      POSTGRES_PASSWORD: moviecat
    volumes:
      - moviecat-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moviecat -d moviecat_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      
volumes:
  moviecat-data:
