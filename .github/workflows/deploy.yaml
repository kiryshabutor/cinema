name: Deploy To Render

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deploy."
            exit 0
          fi

          curl --fail --silent --show-error --location --request POST "${RENDER_DEPLOY_HOOK_URL}"
          echo "Render deploy triggered."
