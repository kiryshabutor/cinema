name: Deploy To Render

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger frontend deploy hook
        run: |
          if [ -z "${RENDER_FRONTEND_DEPLOY_HOOK_URL}" ]; then
            echo "::warning::RENDER_FRONTEND_DEPLOY_HOOK_URL secret is not set. Skipping deploy."
            exit 0
          fi

          curl --fail --silent --show-error --location --request POST "${RENDER_FRONTEND_DEPLOY_HOOK_URL}"
          echo "Render frontend deploy triggered."

  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger backend deploy hook
        run: |
          if [ -z "${RENDER_BACKEND_DEPLOY_HOOK_URL}" ]; then
            echo "::warning::RENDER_BACKEND_DEPLOY_HOOK_URL secret is not set. Skipping deploy."
            exit 0
          fi

          curl --fail --silent --show-error --location --request POST "${RENDER_BACKEND_DEPLOY_HOOK_URL}"
          echo "Render backend deploy triggered."
