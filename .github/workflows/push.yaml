name: Docker Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t moviecat-backend:ci .

      - name: Build frontend image
        run: docker build -t moviecat-frontend:ci -f frontend/Dockerfile frontend
