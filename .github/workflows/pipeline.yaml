name: Pull Request Pipeline

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml

  test:
    uses: ./.github/workflows/test.yaml

  build:
    needs:
      - lint
      - test
    uses: ./.github/workflows/build.yaml
