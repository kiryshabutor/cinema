name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml

  test:
    needs:
      - lint
    uses: ./.github/workflows/test.yaml

  build:
    needs:
      - lint
      - test
    uses: ./.github/workflows/build.yaml
