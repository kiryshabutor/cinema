name: SonarCloud

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_COVERAGE_EXCLUSIONS: >-
        src/main/java/com/moviecat/MovieCatalogApplication.java,
        src/main/java/com/moviecat/aop/**,
        src/main/java/com/moviecat/config/**,
        src/main/java/com/moviecat/controller/**,
        src/main/java/com/moviecat/dto/**,
        src/main/java/com/moviecat/exception/**,
        src/main/java/com/moviecat/mapper/**,
        src/main/java/com/moviecat/model/**,
        src/main/java/com/moviecat/repository/**,
        src/main/java/com/moviecat/service/cache/**,
        src/main/java/com/moviecat/service/PagingSortingUtils.java

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build, test, and generate JaCoCo report
        run: mvn -B clean verify

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
          SONAR_PROJECT_KEY_CLEAN="$(printf '%s' "${SONAR_PROJECT_KEY}" | tr -d '\r\n')"
          SONAR_ORGANIZATION_CLEAN="$(printf '%s' "${SONAR_ORGANIZATION}" | tr -d '\r\n')"

          if [ -z "${SONAR_TOKEN_CLEAN}" ] || [ -z "${SONAR_PROJECT_KEY_CLEAN}" ] || [ -z "${SONAR_ORGANIZATION_CLEAN}" ]; then
            echo "::warning::SonarCloud scan was skipped."
            echo "::warning::Set SONAR_TOKEN secret and SONAR_PROJECT_KEY / SONAR_ORGANIZATION variables."
            exit 0
          fi

          if [ "${SONAR_TOKEN}" != "${SONAR_TOKEN_CLEAN}" ]; then
            echo "::warning::SONAR_TOKEN contains line breaks. Sanitized token will be used."
          fi

          mvn -B sonar:sonar \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN_CLEAN}" \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY_CLEAN}" \
            -Dsonar.organization="${SONAR_ORGANIZATION_CLEAN}" \
            -Dsonar.coverage.exclusions="${SONAR_COVERAGE_EXCLUSIONS}"
