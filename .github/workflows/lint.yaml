name: Lint

on:
  workflow_call:
  workflow_dispatch:

jobs:
  backend-checkstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Checkstyle
        run: mvn -B -DskipTests checkstyle:check

  workflow-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        run: |
          ACTIONLINT_VERSION=1.7.8
          curl --fail --silent --show-error --location \
            --output /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint

  blueprint-syntax:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate render.yaml syntax
        run: python3 -c 'import yaml; yaml.safe_load(open("render.yaml", encoding="utf-8")); print("render.yaml syntax OK")'
