name: Lint

on:
  workflow_call:
  workflow_dispatch:

jobs:
  backend-checkstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Checkstyle
        run: mvn -B -DskipTests checkstyle:check

  workflow-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1
        with:
          shellcheck: false

  blueprint-syntax:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate render.yaml syntax
        run: ruby -e 'require "yaml"; YAML.load_file("render.yaml"); puts "render.yaml syntax OK"'
